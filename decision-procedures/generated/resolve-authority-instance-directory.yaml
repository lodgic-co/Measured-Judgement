generated_by: cursor
procedure_name: ResolveAuthorityInstance
procedure_kind: domain
identifier_mode: boundary_resolving
owning_service: measured-judgement
purpose: >
  Resolve the authority_instance_id and deployment base_url for a given
  organisation_uuid. This is the database-backed routing lookup that enables
  polite-intervention to route organisation-scoped calls to the correct
  considered-response deployment.

  This procedure is the authoritative source for the routing directory.
  polite-intervention's resolve-authority-instance procedure delegates to
  this endpoint per the centralised-routing-resolution pattern:
  patterns/platform/centralised-routing-resolution.yaml.
source_files:
  - src/domain/procedures.ts
  - src/routes/routing.ts
caller_context: >
  Called by polite-intervention via GET /routing/authority-instance on every
  organisation-scoped request. The organisationUuid is extracted from the
  request path after UUID validation.
inputs:
  - organisationUuid (string UUID, required)
outputs:
  - authority_instance_id (string — the named deployment identifier)
  - base_url (string — the downstream service URL for routing)
preconditions:
  - organisationUuid must be a syntactically valid UUID (enforced at the
    HTTP boundary before this procedure is called).
decision_logic:
  - Validate organisationUuid is non-empty; throw InvalidRequest if missing.
  - Query organisation_authority_assignments JOIN authority_instances
    WHERE organisation_uuid = $1.
  - If no row found, throw NotFound.
    polite-intervention maps this to bad_gateway (502) — there is no routing
    assignment for this organisation.
  - Return { authority_instance_id, base_url }.
routing_invariants:
  - Every routable organisation must have an explicit assignment.
  - No wildcard entries are permitted.
  - The routing table is owned entirely by measured-judgement. polite-intervention
    does not maintain a local copy.
error_behaviour:
  - invalid_request (400): organisationUuid is missing or empty.
  - not_found (404): no routing assignment for the given organisationUuid.
    Callers (polite-intervention) map this to bad_gateway (502).
scoping_constraints:
  - Operates on the measured_judgement schema. No cross-service DB access.
  - Routing assignments are populated via seed data or admin tooling.
data_dependencies:
  - measured_judgement.organisation_authority_assignments (organisation_uuid,
    authority_instance_id)
  - measured_judgement.authority_instances (id, base_url)
side_effects: none
default_outcome: >
  Returns { authority_instance_id, base_url } for a known organisation.
  Returns not_found (404) for organisations without a routing assignment.
