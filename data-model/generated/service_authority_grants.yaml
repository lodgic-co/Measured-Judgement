generated_by: cursor
id: service_authority_grants
entity_name: service_authority_grants
owning_service: measured-judgement
persistence_object: measured_judgement.service_authority_grants
tenant_scope: service-global
mutability: mutable
primary_key: [id]
unique_constraints:
  - [capability_key, caller_service_id]
cross_service_references:
  - column: caller_service_id
    references_service: auth0
    references_entity: m2m_application
    reference_mode: external_identifier
    notes: >
      caller_service_id is the Auth0 M2M client_id of the calling service.
      No database FK. This is the azp claim value in the calling service's
      outbound M2M JWTs.
fields:
  - name: id
    type: integer
    nullable: false
    notes: Identity primary key, generated always.
  - name: capability_key
    type: text
    nullable: false
    notes: >
      FK to service_capabilities.key. The capability being granted.
      Immutable once a row is created.
  - name: caller_service_id
    type: text
    nullable: false
    notes: >
      Auth0 M2M client_id of the service being granted access. This is the
      azp claim value in the calling service's outbound JWTs, verified at
      route level by AssertServiceCapability against the startup allowlist.
  - name: created_at
    type: timestamptz
    nullable: false
    default: now()
indexes:
  - name: idx_service_authority_grants_capability_key
    columns: [capability_key]
    purpose: >
      Supports join with service_capabilities during the startup grants query.
  - name: idx_service_authority_grants_caller
    columns: [caller_service_id]
    purpose: >
      Supports lookups of all capabilities granted to a specific caller.
notes: >
  Records which services are authorised to exercise each service capability.
  Owning services query GET /service-authorities/grants at startup to build
  a Map<capability_key, Set<caller_service_id>> in memory. This allowlist is
  consulted at request time by AssertServiceCapability without any MJ call.

  UNIQUE(capability_key, caller_service_id) prevents duplicate grants.
